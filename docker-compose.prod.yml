# ============================================================
# 生产环境 compose 文件 — 使用预构建镜像，不在服务器上编译
# 用法: docker compose -f docker-compose.prod.yml up -d
# ============================================================
version: "3.8"

services:
  omr-service:
    image: omr-service:latest    # 使用本地已加载的镜像，不构建
    container_name: omr-service
    restart: unless-stopped
    ports:
      - "20884:20884"
      - "8080:8080"
    volumes:
      - ./output:/app/output
      - ./omr_service/templates:/app/omr_service/templates
    environment:
      - TZ=Asia/Shanghai
      - OMR_DUBBO_PORT=20884
      - NACOS_SERVER=${NACOS_SERVER:-127.0.0.1:8848}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-public}
      - NACOS_USERNAME=${NACOS_USERNAME:-}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-127.0.0.1}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - OMR_WORKER_COUNT=${OMR_WORKER_COUNT:-4}
