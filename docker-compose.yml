version: "3.8"

services:
  omr-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: omr-service:latest
    container_name: omr-service
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # 输出目录持久化（裁剪图片、识别结果）
      - ./output:/app/output
      # 模板目录（可选挂载，便于热更新模板JSON）
      - ./omr_demo/templates:/app/omr_demo/templates
    environment:
      - TZ=Asia/Shanghai
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=50
    # 如需限制内存:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4g
